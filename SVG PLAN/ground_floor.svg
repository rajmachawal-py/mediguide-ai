  <text x="320" y="322" text-anchor="middle" fill="#1a3a6e" font-size="10">X-Ray · CT Scan</text>
  <text x="320" y="338" text-anchor="middle" fill="#1a3a6e" font-size="10">MRI · Ultrasound</text>
  <text x="320" y="354" text-anchor="middle" fill="#1a3a6e" font-size="9">Reporting Room</text>

