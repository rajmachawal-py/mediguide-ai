<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="750" viewBox="0 0 1100 750" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#b0c4de" stroke-width="1" opacity="0.4"/>
    </pattern>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" fill="#f0f4f8"/>

  <!-- Outer building wall -->
  <rect x="30" y="60" width="1040" height="660" fill="#e8edf2" stroke="#2c3e50" stroke-width="5" rx="4"/>

  <!-- Title -->
  <rect x="30" y="10" width="1040" height="45" fill="#1a3a5c" rx="3"/>
  <text x="550" y="36" text-anchor="middle" fill="white" font-size="16" font-weight="700" letter-spacing="3">RUBY HALL CLINIC, PUNE  ·  GROUND FLOOR PLAN  (G)</text>
  <text x="1060" y="80" text-anchor="end" fill="#7f8c8d" font-size="10" font-style="italic">↑ N</text>

  <!-- ══════════════ SECTION A: TOP ROW ══════════════ -->

  <!-- Main Entrance Lobby / Reception -->
  <rect x="40" y="70" width="310" height="150" fill="#c8a2c8" fill-opacity="0.35" stroke="#7b2d8b" stroke-width="2"/>
  <text x="195" y="125" text-anchor="middle" fill="#4a0072" font-size="13" font-weight="700">MAIN ENTRANCE</text>
  <text x="195" y="143" text-anchor="middle" fill="#4a0072" font-size="11">LOBBY &amp; RECEPTION</text>
  <text x="195" y="159" text-anchor="middle" fill="#4a0072" font-size="10">Info Desk · Seating · Help</text>

  <!-- OPD Registration -->
  <rect x="355" y="70" width="200" height="150" fill="#c8a2c8" fill-opacity="0.35" stroke="#7b2d8b" stroke-width="2"/>
  <text x="455" y="130" text-anchor="middle" fill="#4a0072" font-size="12" font-weight="700">OPD</text>
  <text x="455" y="148" text-anchor="middle" fill="#4a0072" font-size="11">REGISTRATION</text>
  <text x="455" y="165" text-anchor="middle" fill="#4a0072" font-size="10">&amp; BILLING</text>

  <!-- Emergency & Casualty -->
  <rect x="560" y="70" width="230" height="150" fill="#e74c3c" fill-opacity="0.28" stroke="#c0392b" stroke-width="3"/>
  <text x="675" y="120" text-anchor="middle" fill="#7b0000" font-size="13" font-weight="700">⚡ EMERGENCY</text>
  <text x="675" y="138" text-anchor="middle" fill="#7b0000" font-size="11">&amp; CASUALTY</text>
  <text x="675" y="155" text-anchor="middle" fill="#7b0000" font-size="10">24 × 7  ·  Triage  ·  Resus</text>
  <text x="675" y="170" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="700">☎ 108</text>

  <!-- Ambulance Bay -->
  <rect x="795" y="70" width="175" height="75" fill="#e74c3c" fill-opacity="0.18" stroke="#c0392b" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="882" y="103" text-anchor="middle" fill="#7b0000" font-size="11" font-weight="700">AMBULANCE BAY</text>
  <text x="882" y="119" text-anchor="middle" fill="#7b0000" font-size="10">&amp; DROP-OFF ZONE</text>

  <!-- Security -->
